<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library - Admin Dashboard</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
    :root {
        --neu-blue: #004a99;
        --neu-gold: #c8aa6e;
        --hex-dark: #000a1a;
        --hex-panel: #011326;
        --hex-border: #785a28;
        --hex-text: #f0e6d2;
        --hex-glow: rgba(200, 170, 110, 0.3);
    }

    body { 
        font-family: 'Segoe UI', sans-serif; 
        margin: 0; 
        background: radial-gradient(circle at top right, #011326 0%, #000a1a 100%); 
        color: var(--hex-text);
        min-height: 100vh;
    }
    
    /* Sidebar - Hextech Vertical Menu */
    #sidebar { 
        position: fixed; left: -250px; top: 0; width: 250px; height: 100%; 
        background: var(--hex-panel); 
        border-right: 1px solid var(--hex-border);
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        z-index: 1000; padding-top: 80px; 
        box-shadow: 10px 0 30px rgba(0,0,0,0.5); 
    }
    #sidebar button { 
        width: 100%; padding: 20px; background: none; border: none; 
        color: var(--hex-text); text-align: left; cursor: pointer; 
        font-size: 14px; font-weight: bold; letter-spacing: 2px;
        text-transform: uppercase; transition: 0.3s;
        border-left: 3px solid transparent;
    }
    #sidebar button:hover { 
        background: rgba(200, 170, 110, 0.1); 
        color: var(--neu-gold); 
        border-left: 3px solid var(--neu-gold);
        text-shadow: 0 0 10px var(--hex-glow);
    }

    /* Header Styling */
    header { 
        background: rgba(1, 19, 38, 0.9); 
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--hex-border);
        color: white; padding: 15px 20px; text-align: center; 
        position: sticky; top: 0; display: flex; 
        justify-content: center; align-items: center; z-index: 900;
    }
    header h1 { 
        margin: 0; font-size: 20px; letter-spacing: 4px; 
        color: var(--neu-gold); text-transform: uppercase;
        text-shadow: 0 0 15px var(--hex-glow);
    }

    #menu-btn { position: absolute; left: 20px; background: none; border: none; color: var(--neu-gold); font-size: 24px; cursor: pointer; }
    #live-clock { position: absolute; right: 20px; color: var(--neu-gold); font-weight: bold; font-family: 'Courier New', monospace; font-size: 16px; }

    .container { padding: 30px; max-width: 1200px; margin: auto; }

    /* Hextech Stat Cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { 
        background: var(--hex-panel); padding: 25px; border: 1px solid var(--hex-border);
        position: relative; text-align: center; overflow: hidden;
    }
    .stat-card::before {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--neu-gold);
    }
    .stat-card h3 { margin: 0; color: var(--neu-gold); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
    .stat-card .count { font-size: 42px; font-weight: bold; color: #fff; margin: 10px 0; text-shadow: 0 0 20px rgba(255,255,255,0.2); }

    /* Tables - Dark Mode */
    .table-container { 
        background: var(--hex-panel); border: 1px solid var(--hex-border); 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
    }
    table { width: 100%; border-collapse: collapse; background: transparent; }
    th { 
        background: rgba(120, 90, 40, 0.2); color: var(--neu-gold); 
        padding: 18px; text-align: left; font-size: 11px; 
        text-transform: uppercase; letter-spacing: 1px;
        border-bottom: 2px solid var(--hex-border);
    }
    td { padding: 16px; border-bottom: 1px solid rgba(120, 90, 40, 0.1); font-size: 14px; color: var(--hex-text); }
    tr:hover { background: rgba(255, 255, 255, 0.03); }

    /* Controls & Inputs */
    #searchInput { 
        background: var(--hex-dark); border: 1px solid var(--hex-border); 
        color: var(--hex-text); padding: 12px; border-radius: 0;
        outline: none; transition: 0.3s;
    }
    #searchInput:focus { border-color: var(--neu-gold); box-shadow: 0 0 10px var(--hex-glow); }

    .btn { 
        padding: 10px 20px; border: 1px solid var(--hex-border); 
        font-weight: bold; cursor: pointer; text-transform: uppercase; 
        letter-spacing: 1px; font-size: 12px; transition: 0.3s;
    }
    .btn-block { background: rgba(220, 53, 69, 0.2); color: #ff4e50; border-color: #ff4e50; }
    .btn-block:hover { background: #ff4e50; color: white; }
    .btn-unblock { background: rgba(40, 167, 69, 0.2); color: #2ecc71; border-color: #2ecc71; }
    .btn-unblock:hover { background: #2ecc71; color: white; }
    .btn-export { background: var(--neu-gold); color: var(--hex-dark); float: right; margin-bottom: 15px; }
    
    /* Filter Bar Styling */
    .filter-bar {
        display: flex; flex-wrap: wrap; gap: 10px; align-items: center; 
        background: var(--hex-panel); padding: 20px; margin-bottom: 20px;
        border: 1px solid var(--hex-border);
    }
    .filter-bar input[type="date"] {
        background: var(--hex-dark); border: 1px solid var(--hex-border);
        color: var(--hex-text); padding: 8px;
    }

    /* Chart Container */
    .chart-box {
        background: var(--hex-panel); padding: 25px; border: 1px solid var(--hex-border);
        margin-top: 20px;
    }
</style>

<body>

<div id="sidebar">
    <button onclick="showPage('logs')">📋 VISIT LOGS</button>
    <button onclick="showPage('stats')">📊 STATISTICS</button>
    <button onclick="showPage('blocked')">🚫 BLOCKED USERS</button>
    <button onclick="adminLogout()" style="margin-top: 40px; color: #ff4e50; border-top: 1px solid rgba(255,78,80,0.2);">LOG OUT</button>
</div>

<header>
    <button id="menu-btn" onclick="toggleSidebar()">☰</button>
    <h1 id="page-header">VISIT LOGS</h1>
    <div id="live-clock">--:--:-- --</div>
</header>

<div class="container">
    <div id="page-logs">
        <div style="overflow: hidden; margin-bottom: 10px;">
            <input type="text" id="searchInput" placeholder="SEARCH OPERATIVES..." onkeyup="filterTable()" style="width: 300px;">
            <button class="btn btn-export" onclick="downloadPDF()">Export PDF</button>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Full Name</th>
                        <th>College</th>
                        <th>Type/Course</th>
                        <th>Time In</th> 
                        <th>Reason</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="page-stats" style="display:none;">
        <div class="filter-bar">
            <button class="btn" style="background: transparent; color: var(--neu-gold);" onclick="filterQuick('daily')">Daily</button>
            <button class="btn" style="background: transparent; color: var(--neu-gold);" onclick="filterQuick('weekly')">Weekly</button>
            <button class="btn" style="background: transparent; color: var(--neu-gold);" onclick="filterQuick('monthly')">Monthly</button>
            <div style="border-left: 1px solid var(--hex-border); height: 30px; margin: 0 10px;"></div>
            <input type="date" id="startDate">
            <span style="color: var(--neu-gold); font-size: 12px;">TO</span>
            <input type="date" id="endDate">
            <button class="btn" style="background: var(--neu-gold); color: var(--hex-dark);" onclick="applyCustomFilter()">Apply Filter</button>
            <button class="btn" style="background: transparent; color: #666; border-color: #666;" onclick="resetStats()">Reset</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>Filtered Results</h3><div class="count" id="filtered-count">0</div></div>
            <div class="stat-card"><h3>Today (Total)</h3><div class="count" id="today-count">0</div></div>
            <div class="stat-card"><h3>Total Logs</h3><div class="count" id="total-count">0</div></div>
        </div>
        
        <div class="chart-box">
            <canvas id="visitChart" style="max-height: 400px;"></canvas>
        </div>
    </div>

    <div id="page-blocked" style="display:none;">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Full Name</th>
                        <th>College</th>
                        <th>Email</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="blockedTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let fullData = [];
    let myChart = null;

    // 1. CLOCK FUNCTION (SAFE)
    function startClock() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        }, 1000);
    }

    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        sb.style.left = (sb.style.left === '0px') ? '-250px' : '0px';
    }

    function showPage(pageId) {
        ['logs', 'stats', 'blocked'].forEach(p => document.getElementById('page-' + p).style.display = 'none');
        document.getElementById('page-' + pageId).style.display = 'block';
        document.getElementById('page-header').innerText = pageId.toUpperCase().replace('-', ' ');
        toggleSidebar();
        if(pageId === 'stats') updateStats(fullData);
    }

    async function loadData() {
        try {
            const res = await fetch('/admin-stats');
            fullData = await res.json();
            updateStats(fullData);
            renderTables();
        } catch (err) { console.error("Data Load Error:", err); }
    }

    function updateStats(dataToUse) {
        const todayStr = new Date().toDateString();
        document.getElementById('today-count').innerText = fullData.filter(l => new Date(l.created_at).toDateString() === todayStr).length;
        document.getElementById('total-count').innerText = fullData.length;
        document.getElementById('filtered-count').innerText = dataToUse.length;
        initChart(dataToUse);
    }

    function filterQuick(type) {
        const now = new Date();
        const startOfToday = new Date();
        startOfToday.setHours(0,0,0,0);
        let filtered = [];
        if (type === 'daily') filtered = fullData.filter(l => new Date(l.created_at) >= startOfToday);
        else if (type === 'weekly') {
            const lastWeek = new Date(); lastWeek.setDate(now.getDate() - 7);
            filtered = fullData.filter(l => new Date(l.created_at) >= lastWeek);
        } else if (type === 'monthly') {
            const lastMonth = new Date(); lastMonth.setMonth(now.getMonth() - 1);
            filtered = fullData.filter(l => new Date(l.created_at) >= lastMonth);
        }
        updateStats(filtered);
    }

    function applyCustomFilter() {
        const startVal = document.getElementById('startDate').value;
        const endVal = document.getElementById('endDate').value;
        if (!startVal || !endVal) return alert("Select both dates");
        const start = new Date(startVal); start.setHours(0,0,0,0);
        const end = new Date(endVal); end.setHours(23,59,59,999);
        const filtered = fullData.filter(l => {
            const d = new Date(l.created_at);
            return d >= start && d <= end;
        });
        updateStats(filtered);
    }

    function resetStats() {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        updateStats(fullData);
    }

    function initChart(dataToUse) {
        const ctx = document.getElementById('visitChart').getContext('2d');
        const counts = [0, 0, 0, 0, 0, 0, 0];
        dataToUse.forEach(l => { counts[new Date(l.created_at).getDay()]++; });
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
                datasets: [{ label: 'Visitors', data: counts, backgroundColor: '#000033' }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function renderTables() {
        const logsBody = document.getElementById('logsTableBody');
        const blockedBody = document.getElementById('blockedTableBody');
        logsBody.innerHTML = ''; 
        blockedBody.innerHTML = '';
        const blockedEmails = new Set();
        let blockedCount = 0;

        fullData.forEach(item => {
            const v = item.visitors || {};
            // Formatting the Time In safely
            const timeIn = new Date(item.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });

            if (v.is_blocked) {
                if (!blockedEmails.has(v.email)) {
                    blockedEmails.add(v.email);
                    blockedCount++;
                    blockedBody.insertAdjacentHTML('beforeend', `
                        <tr>
                            <td>${v.full_name || 'Unknown'}</td>
                            <td>${v.program_college || 'N/A'}</td>
                            <td>${v.email}</td>
                            <td><button class="btn btn-unblock" onclick="toggleBlock('${v.email}', false)">Unblock</button></td>
                        </tr>
                    `);
                }
            } else {
                const action = v.is_admin ? '<b>ADMIN</b>' : `<button class="btn btn-block" onclick="toggleBlock('${v.email}', true)">Block</button>`;
                logsBody.insertAdjacentHTML('beforeend', `
                    <tr>
                        <td>${v.full_name || 'N/A'}</td>
                        <td>${v.program_college || 'N/A'}</td>
                        <td>${v.user_type || 'N/A'}</td>
                        <td>${timeIn}</td> <td>${item.reason || 'N/A'}</td>
                        <td>${action}</td>
                    </tr>
                `);
            }
        });

        if (blockedCount === 0) {
            blockedBody.innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 40px; color: #666; font-weight: bold;">🚫 No users are currently blocked.</td></tr>`;
        }
    }

    async function toggleBlock(email, status) {
        if (!confirm("Are you sure?")) return;
        const res = await fetch('/toggle-block', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, blockStatus: status })
        });
        if (res.ok) loadData();
    }

    function filterTable() {
        const val = document.getElementById("searchInput").value.toUpperCase();
        document.querySelectorAll("#logsTableBody tr").forEach(row => {
            row.style.display = row.innerText.toUpperCase().includes(val) ? "" : "none";
        });
    }


    
    async function adminLogout() { if(confirm("Logout?")) window.location.href = "/"; }

    // Init everything
    loadData();
    startClock();
</script>
</body>
</html>
