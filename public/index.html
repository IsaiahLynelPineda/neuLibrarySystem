<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library System</title>
    <style>
        :root { --neu-blue: #004a99; --neu-gold: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 500px; border-top: 8px solid var(--neu-blue); text-align: center; display: none; }
        #startingPage { position: fixed; inset: 0; background: linear-gradient(rgba(0,20,50,0.8), rgba(0,20,50,0.8)), url('https://www.neu.edu.ph/main/assets/images/slider/bg1.jpg') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 1000; }
        .submit-btn { width: 100%; padding: 15px; margin-top: 15px; background: var(--neu-blue); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .google-btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 15px; background: white; border: 1px solid #ddd; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .user-pill { background: #eef2f7; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: left; border-left: 5px solid var(--neu-blue); }
        label { font-size: 11px; font-weight: bold; color: var(--neu-blue); text-transform: uppercase; display: block; }
        select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div id="startingPage">
        <img src="https://www.neu.edu.ph/main/assets/images/logo.png" width="130">
        <h1>NEU LIBRARY</h1>
        <button onclick="showPage('selectionCard')" style="padding: 18px 60px; background: var(--neu-gold); color: #002d5a; border: none; font-weight: 900; border-radius: 50px; cursor: pointer;">ENTER SYSTEM</button>
    </div>

    <div class="card" id="selectionCard">
        <h2>Access Mode</h2>
        <p>Please select your mode of login:</p>
        <button class="submit-btn" onclick="setMode('visitor')">Visitor Log-in</button>
        <button class="submit-btn" style="background:#555;" onclick="setMode('admin')">Admin Log-in</button>
    </div>

    <div class="card" id="loginCard">
        <h2 id="loginHeader">Authentication</h2>
        <button class="google-btn" onclick="triggerGoogleAuth()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="20">
            Continue with Google
        </button>
    </div>

    <div class="card" id="formCard">
        <div id="formContent">
            <div class="user-pill">
                <label>Email</label><input type="text" id="dispEmail" readonly style="border:none; background:transparent; font-weight:bold;">
            </div>
            <select id="college" onchange="updatePrograms()"><option value="" disabled selected>Select College</option></select>
            <select id="program"><option value="" disabled selected>Select Program</option></select>
            <select id="reason">
                <option value="" disabled selected>Pick a reason</option>
                <option value="reading">Reading</option>
                <option value="research">Research</option>
                <option value="computer">Use of Computer</option>
            </select>
            <button class="submit-btn" onclick="processCheckIn()">Check-in / Log Visit</button>
        </div>

        <div id="successView" style="display:none;">
            <h3 id="welcomeHeader">Success!</h3>
            <button id="adminSuccessBtn" onclick="window.location.href='admin.html'" style="display:none;" class="submit-btn">📊 GO TO DASHBOARD</button>
            <button onclick="fullReset()" class="submit-btn" style="background:#333;">Log Out</button>
        </div>
    </div>

    <div class="card" id="errorCard">
        <h2 style="color:red;">Access Denied</h2>
        <p id="errorMessage"></p>
        <button class="submit-btn" onclick="fullReset()">Back to Start</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = supabase.createClient('https://bekehjenxkzrvsoxqjgi.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJla2VoamVueGt6cnZzb3hxamdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTAyMjIsImV4cCI6MjA4OTM4NjIyMn0.QYcz_s_NvF6yxKBpVIP47sTcLjwsB9eUA00htYaoI9w');
        
        const MASTER_ADMINS = ['jcesperanza@neu.edu.ph', 'isaiahlynel.pineda@neu.edu.ph', 'janrey.maranan@neu.edu.ph', 'czesckahalie.bongco@neu.edu.ph'];

        const programsData = {
            "College of Informatics and Computing Studies": ["BS in Information Technology", "BS in Computer Science", "BS in Information System"],
            "College of Business Administration": ["BSBA Financial Management", "BSBA Marketing Management"]
            // ... I can help you add the rest of your huge list here!
        };

        function showPage(id) {
            ['startingPage', 'selectionCard', 'loginCard', 'formCard', 'errorCard'].forEach(p => {
                const el = document.getElementById(p);
                if(el) el.style.display = 'none';
            });
            const target = document.getElementById(id);
            if(id === 'startingPage') target.style.display = 'flex';
            else target.style.display = 'block';
        }

        function setMode(mode) {
            localStorage.setItem('loginMode', mode);
            document.getElementById('loginHeader').innerText = mode === 'admin' ? "Admin Login" : "Visitor Login";
            showPage('loginCard');
        }

        async function triggerGoogleAuth() {
            await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
        }

        async function init() {
            const isAuthRedirect = window.location.hash.includes('access_token');
            if (isAuthRedirect) {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) handleAuth(user);
            } else {
                showPage('startingPage');
            }
        }

        function handleAuth(user) {
            const email = user.email.toLowerCase();
            const mode = localStorage.getItem('loginMode');

            if (!email.endsWith('@neu.edu.ph')) {
                document.getElementById('errorMessage').innerText = "Must use an @neu.edu.ph email!";
                showPage('errorCard');
                return;
            }

            if (mode === 'admin') {
                if (MASTER_ADMINS.includes(email)) {
                    showPage('formCard');
                    document.getElementById('formContent').style.display = 'none';
                    document.getElementById('successView').style.display = 'block';
                    document.getElementById('adminSuccessBtn').style.display = 'block';
                    document.getElementById('welcomeHeader').innerText = "Admin Verified";
                } else {
                    document.getElementById('errorMessage').innerText = "You are not an authorized Admin.";
                    showPage('errorCard');
                }
            } else {
                showPage('formCard');
                document.getElementById('dispEmail').value = email;
            }
        }

        async function fullReset() {
            await supabaseClient.auth.signOut();
            localStorage.clear();
            window.location.href = window.location.origin;
        }

        // Initialize on load
        init();

        // Populate Colleges
        const colSelect = document.getElementById('college');
        Object.keys(programsData).forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.text = c;
            colSelect.add(opt);
        });

        function updatePrograms() {
            const col = colSelect.value;
            const pSelect = document.getElementById('program');
            pSelect.innerHTML = '<option value="" disabled selected>Select Program</option>';
            programsData[col].forEach(p => {
                const opt = document.createElement('option');
                opt.value = p; opt.text = p;
                pSelect.add(opt);
            });
        }
    </script>
</body>
</html>
