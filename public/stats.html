<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library - Statistics</title>
    <style>
        :root { --neu-blue: #004a99; --neu-gold: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 20px; }
        
        /* Stats Grid */
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--neu-blue); text-align: center; }
        .stat-card h3 { margin: 0; color: #666; font-size: 14px; text-transform: uppercase; }
        .stat-card .value { font-size: 32px; font-weight: bold; color: var(--neu-blue); margin-top: 10px; }

        /* Filter Section */
        .controls { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: bold; color: var(--neu-blue); }
        select, input { padding: 8px; border-radius: 6px; border: 1px solid #ccc; }
        
        .btn-nav { padding: 10px 20px; background: var(--neu-blue); color: white; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1 style="color: var(--neu-blue);">📊 Visitor Statistics</h1>
        <a href="admin.html" class="btn-nav">← Back to Dashboard</a>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Timeframe</label>
            <select id="timeRange" onchange="loadStats()">
                <option value="today">Today</option>
                <option value="week">This Week</option>
                <option value="month">This Month</option>
                <option value="custom">Custom Range</option>
            </select>
        </div>
        <div id="customDates" style="display:none; gap: 10px;">
            <div class="control-group"><label>Start</label><input type="date" id="startDate" onchange="loadStats()"></div>
            <div class="control-group"><label>End</label><input type="date" id="endDate" onchange="loadStats()"></div>
        </div>
        <div class="control-group">
            <label>College</label>
            <select id="filterCollege" onchange="loadStats()">
                <option value="all">All Colleges</option>
                </select>
        </div>
        <div class="control-group">
            <label>User Type</label>
            <select id="filterType" onchange="loadStats()">
                <option value="all">Everyone</option>
                <option value="student">Students Only</option>
                <option value="personnel">Faculty & Staff</option>
            </select>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <h3>Total Foot Traffic</h3>
            <div class="value" id="statTotal">0</div>
        </div>
        <div class="stat-card">
            <h3>Unique Individuals</h3>
            <div class="value" id="statUnique">0</div>
        </div>
        <div class="stat-card">
            <h3>Faculty & Staff Visits</h3>
            <div class="value" id="statFaculty">0</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Use your existing Supabase credentials here
        const supabaseClient = supabase.createClient('YOUR_URL', 'YOUR_KEY');

        async function loadStats() {
            const timeRange = document.getElementById('timeRange').value;
            const customDates = document.getElementById('customDates');
            customDates.style.display = timeRange === 'custom' ? 'flex' : 'none';

            // 1. Fetch data from your 'visit_logs' table (with the visitor info)
            let query = supabaseClient.from('visit_logs').select(`*, visitors (*)`);

            // 2. Apply Time Filter Logic
            const now = new Date();
            if (timeRange === 'today') {
                query = query.gte('created_at', new Date(now.setHours(0,0,0,0)).toISOString());
            } else if (timeRange === 'week') {
                const weekAgo = new Date(now.setDate(now.getDate() - 7));
                query = query.gte('created_at', weekAgo.toISOString());
            }
            // ... add month and custom logic similarly

            const { data, error } = await query;
            if (error) return console.error(error);

            // 3. APPLY CLIENT-SIDE FILTERS (College, Type, etc.)
            const college = document.getElementById('filterCollege').value;
            const userType = document.getElementById('filterType').value;

            let filtered = data.filter(log => {
                const v = log.visitors;
                const matchCollege = college === 'all' || v.program_college === college;
                
                let matchType = true;
                if (userType === 'personnel') matchType = (v.user_type === 'Faculty' || v.user_type === 'Staff');
                if (userType === 'student') matchType = (v.user_type !== 'Faculty' && v.user_type !== 'Staff');

                return matchCollege && matchType;
            });

            // 4. UPDATE CARDS
            document.getElementById('statTotal').innerText = filtered.length;
            document.getElementById('statUnique').innerText = new Set(filtered.map(l => l.visitors.email)).size;
            document.getElementById('statFaculty').innerText = filtered.filter(l => l.visitors.user_type === 'Faculty' || l.visitors.user_type === 'Staff').length;
        }

        loadStats();
    </script>
</body>
</html>
